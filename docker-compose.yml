services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mobile-banking-api
    environment:
      DATABASE_URL: postgresql+psycopg2://banking:banking_dev@db:5432/banking
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: mobile-banking-postgres
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking_dev
      POSTGRES_DB: banking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d banking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
